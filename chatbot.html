<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عطار | المساعد الذكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1a4f8a;
    --brand-light: #e8f0fa;
    --brand-dark: #0d2f56;
    --accent: #f0a500;
    --bg: #f5f7fb;
    --surface: #ffffff;
    --text: #1c1c2e;
    --muted: #6b7280;
    --border: #e2e8f0;
    --bot-bubble: #ffffff;
    --user-bubble: #1a4f8a;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(26,79,138,0.10);
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 780px;
    height: 92vh;
    max-height: 860px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 46px;
    height: 46px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }

  .header-title {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── Messages ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome message */
  .welcome-card {
    background: var(--brand-light);
    border: 1px solid rgba(26,79,138,0.15);
    border-radius: var(--radius);
    padding: 20px 22px;
    text-align: center;
    margin-bottom: 8px;
  }

  .welcome-card h2 {
    color: var(--brand);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .welcome-card p {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    justify-content: center;
  }

  .quick-btn {
    background: #fff;
    border: 1px solid rgba(26,79,138,0.25);
    color: var(--brand);
    font-family: inherit;
    font-size: 12.5px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }

  /* Bubbles */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    background: var(--brand-light);
  }

  .msg-row.user .msg-avatar {
    background: var(--brand);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.75;
    word-break: break-word;
  }

  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-right-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .msg-row.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-left-radius: 6px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input ── */
  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(26,79,138,0.08);
  }

  .input-row input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14.5px;
    color: var(--text);
    outline: none;
    padding: 4px 0;
    direction: auto;
  }

  .input-row input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--brand);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--brand-dark); }
  .send-btn:active { transform: scale(0.94); }

  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <div class="header-title">مساعد عطار الذكي</div>
      <div class="header-sub">
        <span class="status-dot"></span>
        متاح الآن · Attar Software Engineering
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <div class="welcome-card">
      <h2>أهلاً وسهلاً! 👋</h2>
      <p>أنا المساعد الذكي لشركة عطار لهندسة البرامج.<br>اسألني عن أنظمتنا، خدماتنا، أو أي استفسار آخر.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick('ما هي خدمات شركة عطار؟')">خدماتنا</button>
        <button class="quick-btn" onclick="sendQuick('ما هي الأنظمة المتاحة؟')">الأنظمة</button>
        <button class="quick-btn" onclick="sendQuick('كيف أتواصل معكم؟')">تواصل معنا</button>
        <button class="quick-btn" onclick="sendQuick('What services do you offer?')">Services</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="اكتب سؤالك هنا... / Ask me anything"
             onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">عطار لهندسة البرامج · جدة · 0507363550</div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');

  function addMessage(text, role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '🤖' : 'أ';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble bot typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg) return;
    inputEl.value = '';
    addMessage(msg, 'user');
    addTyping();

    try {
      const fd = new FormData();
      fd.append('msg', msg);
      const res = await fetch('/chat', { method: 'POST', body: fd });
      const data = await res.json();
      removeTyping();
      addMessage(data.response, 'bot');
    } catch (e) {
      removeTyping();
      addMessage('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.', 'bot');
    }
  }

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }
</script>
</body>
</html>
